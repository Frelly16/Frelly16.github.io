<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="https://www.pngall.com/wp-content/uploads/4/Heart-Symbol-PNG-Free-Image.png">
<title>Mi amorcito</title>
<style>
  body {
    background-color: #333;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  @keyframes aparecer {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .flor {
    background-image: url('https://cdn-icons-png.flaticon.com/512/10131/10131273.png');
    background-size: cover;
    background-position: top center;
    opacity: 0;
    width: 40vw;
    height: 100vh;
    animation: aparecer 10s forwards;
  }
  @media (max-width: 600px) {
    .flor {
      width: 90vw;
      height: 70vh;
      background-size: cover;
    }
  }
  .frase {
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="flor"></div>


<footer> <div class="frase">Un mes más a tu lado me llena de alegría ♥</div> </footer>
</body>
</html>
